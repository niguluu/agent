version: 2
style:
  source: .junie/AGENTS.md
git:
  local_only: true
  never_push: true
  never_pull: true
  note: orchestrator handles merges locally; do not touch any remote
flow:
  - read the task first
  - make a short plan
  - keep changes small
  - reuse the patch pattern when it fits
  - prefer focused file checks over full repo tree dumps
  - never print huge file contents unless needed
  - focus on implementation details that keep code simple
output:
  final:
    - say what changed
    - name touched files
    - if many files change list the key files first then count the rest
    - keep the result direct
