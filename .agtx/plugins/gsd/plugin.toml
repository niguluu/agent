name = "gsd"
description = "Get Shit Done - structured spec-driven development framework"
init_script = "npx get-shit-done-cc@latest --{agent} --local --non-interactive"
supported_agents = ["claude", "codex", "gemini", "opencode"]
cyclic = true
copy_files = [".planning/config.json", ".planning/PROJECT.md", ".planning/REQUIREMENTS.md", ".planning/ROADMAP.md", ".planning/STATE.md"]

[artifacts]
preresearch = [".planning/config.json", ".planning/PROJECT.md", ".planning/REQUIREMENTS.md", ".planning/ROADMAP.md", ".planning/STATE.md"]
research = ".planning/phases/*/{phase}-CONTEXT.md"
planning = ".planning/phases/*/{phase}-PLAN.md"
running = ".planning/phases/*/{phase}-SUMMARY.md"
review = ".planning/phases/*/UAT.md"

[commands]
preresearch = "/gsd:new-project"
research = "/gsd:discuss-phase {phase}"
planning = "/gsd:plan-phase {phase}"
running = "/gsd:execute-phase {phase}"
review = "/gsd:verify-work {phase}"

[prompts]
research = "Task: {task}"

[prompt_triggers]
research = "What do you want to build?"

[copy_back]
preresearch = [".planning/config.json", ".planning/PROJECT.md", ".planning/REQUIREMENTS.md", ".planning/ROADMAP.md", ".planning/STATE.md"]

[[auto_dismiss]]
detect = ["Map codebase", "Skip mapping", "Enter to select"]
response = "2\nEnter"
